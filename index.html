<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime 26 Gang - Home</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #08080a;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,60,0,0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
            animation: pulseBlast 4s infinite alternate;
            pointer-events: none;
        }

        .main-container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 400px;
            padding: 30px 20px;
            text-align: center;
            border: 3px solid #ff3333;
            border-radius: 8px;
            background: rgba(17, 18, 23, 0.85);
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.4), inset 0 0 15px rgba(0,0,0,0.6);
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            color: #ff3333;
            font-size: 32px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px #ff0000, 0 0 25px #ff3333;
            margin: 0 0 10px 0;
            animation: flicker 2s infinite;
        }

        p {
            color: #8a9199;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 30px 0;
        }

        button {
            background-color: rgba(8, 8, 10, 0.9);
            color: #ff3333;
            border: 2px solid #ff3333;
            padding: 12px 30px;
            font-size: 18px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.2);
        }

        button:hover, button:active {
            background-color: #ff3333;
            color: #ffffff;
            box-shadow: 0 0 20px #ff3333;
            transform: scale(1.05);
        }

        @keyframes pulseBlast {
            0% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.4; }
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 10px #ff0000, 0 0 25px #ff3333; opacity: 1; }
            20%, 24%, 55% { text-shadow: none; color: #440000; opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>WELCOME TO 26 GANG</h1>
        <p>[ Enter at your own risk ]</p>
        <button id="clickBtn">CLICK ME</button>
    </div>

    <script>
        document.getElementById("clickBtn").addEventListener("click", function() {
            let currentPath = window.location.href;
            if (currentPath.includes("content://")) {
                let basePath = currentPath.substring(0, currentPath.lastIndexOf("/"));
                window.location.href = basePath + "/next_page.html";
            } else {
                window.location.href = "next_page.html";
            }
        });
    </script>

</body>
</html>
